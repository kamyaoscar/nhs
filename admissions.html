<!DOCTYPE html><html lang="en-US"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Admissions & Fees Payment | Namungoona High School</title>    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <style>        :root { --primary: #0a2a4b; --secondary: #d32f2f; --accent: #fbc02d; --light: #f8f9fa; }        * { box-sizing: border-box; margin: 0; padding: 0; }        body { font-family: 'Montserrat', sans-serif; padding-top: 120px; background: white; }        .header { background: white; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }        .nav-links a { text-decoration: none; color: var(--primary); font-weight: 700; margin-left: 20px; font-size: 0.75rem; text-transform: uppercase; }        .admission-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 40px 10%; }        .admission-form { background: var(--light); padding: 30px; border-radius: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }        .form-group { display: flex; flex-direction: column; }        .form-group label { font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: var(--primary); }        .form-group input, .form-group select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }        .form-full { grid-column: span 2; }        .submit-btn { grid-column: span 2; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; text-transform: uppercase; }    </style></head><body>    <header class="header">        <img src="SCHOOL BADGE.png" alt="NHS Logo" height="70">        <nav class="nav-links">            <a href="index.html">Home</a>            <a href="director.html">Director</a>            <a href="sectors.html">Sectors</a>            <a href="admissions.html">Admissions</a>            <a href="magazine.html">Magazine</a>            <a href="gallery.html">Gallery</a>        </nav>    </header>    <div class="admission-container">        <form action="https://formspree.io/f/mojrlqgw" method="POST" class="admission-form">            <h2 class="form-full" style="text-align:center; color:var(--primary);">Online Admission Form</h2>            <div class="form-group form-full"><label>Student's Full Name</label><input type="text" name="Student_Name" placeholder="As it appears on PLE/UCE" required></div>            <div class="form-group"><label>Gender</label><select name="Gender"><option value="Male">Male</option><option value="Female">Female</option></select></div>            <div class="form-group"><label>Date of Birth</label><input type="date" name="DOB" required></div>            <div class="form-group form-full"><label>Class Applying For</label><select name="Class"><option value="S1">Senior 1</option><option value="S5">Senior 5</option></select></div>            <button type="submit" class="submit-btn">Submit Application</button>        </form>    </div></body></html>
